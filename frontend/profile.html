<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepMate AI - Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; margin: 0 auto; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #667eea; font-size: 28px; }
        .profile-header { text-align: center; margin-bottom: 30px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 15px; }
        .profile-header h2 { color: #333; font-size: 24px; }
        .profile-header p { color: #888; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-group input:disabled { background: #f8f9ff; color: #555; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-logout { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%); }
        .success { background: #efe; color: #4a4; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; display: none; }
        .error { background: #fee; color: #e44; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; display: none; }
        .back-btn { text-align: center; margin-top: 20px; }
        .back-btn a { color: #667eea; text-decoration: none; font-weight: 600; }
        .divider { border: none; border-top: 2px solid #eee; margin: 25px 0; }
        .stats-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .mini-stat { flex: 1; background: #f8f9ff; padding: 15px; border-radius: 10px; text-align: center; }
        .mini-stat h3 { color: #667eea; font-size: 24px; }
        .mini-stat p { color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎯 PrepMate AI</h1>
        </div>

        <div class="profile-header">
            <div class="avatar">👤</div>
            <h2 id="profileName">Loading...</h2>
            <p id="profileEmail">Loading...</p>
        </div>

        <div class="stats-row">
            <div class="mini-stat">
                <h3 id="resumeStat">0</h3>
                <p>Resumes</p>
            </div>
            <div class="mini-stat">
                <h3 id="interviewStat">0</h3>
                <p>Interviews</p>
            </div>
            <div class="mini-stat">
                <h3 id="dsaStat">0</h3>
                <p>DSA Problems</p>
            </div>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success">Profile updated successfully!</div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Your name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Your email" disabled>
        </div>
        <div class="form-group">
            <label>Target Role</label>
            <input type="text" id="targetRole" placeholder="Ex: Software Engineer at Google">
        </div>
        <div class="form-group">
            <label>Experience</label>
            <input type="text" id="experience" placeholder="Ex: Fresher, 2 years...">
        </div>

        <button class="btn" id="saveBtn">💾 Save Profile</button>

        <hr class="divider">

        <button class="btn btn-logout" id="logoutBtn">🚪 Logout</button>

        <div class="back-btn">
            <a href="dashboard.html">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        const API_BASE = 'https://prepmate-ai-6qpv.onrender.com';

        // Wake up backend server as soon as page loads (Render free tier sleeps when idle)
        fetch(API_BASE + '/').catch(() => {});

        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            loadProfile();
            loadStats();
        };

        async function loadProfile() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(API_BASE + '/profile', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('profileName').textContent = data.name || localStorage.getItem('name') || 'User';
                    document.getElementById('profileEmail').textContent = data.email || '';
                    document.getElementById('name').value = data.name || '';
                    document.getElementById('email').value = data.email || '';
                    document.getElementById('targetRole').value = data.targetRole || '';
                    document.getElementById('experience').value = data.experience || '';
                } else {
                    showError(data.error || 'Could not load profile');
                }
            } catch (e) {
                showError('Server not running! Please try again in a few seconds.');
            }
        }

        function loadStats() {
            // These counts are updated by resume.html, mock-interview.html, coding.html
            document.getElementById('resumeStat').textContent = localStorage.getItem('resumeCount') || 0;
            document.getElementById('interviewStat').textContent = localStorage.getItem('interviewCount') || 0;
            document.getElementById('dsaStat').textContent = localStorage.getItem('dsaCount') || 0;
        }

        document.getElementById('saveBtn').addEventListener('click', async function() {
            const token = localStorage.getItem('token');
            const name = document.getElementById('name').value;
            const targetRole = document.getElementById('targetRole').value;
            const experience = document.getElementById('experience').value;

            if (!name) {
                showError('Name cannot be empty!');
                return;
            }

            hideMessages();

            try {
                const response = await fetch(API_BASE + '/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ name, targetRole, experience })
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('success').style.display = 'block';
                    document.getElementById('profileName').textContent = name;
                    localStorage.setItem('name', name);
                } else {
                    showError(data.error || 'Could not save profile');
                }
            } catch (e) {
                showError('Server not running! Please try again in a few seconds.');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('name');
            window.location.href = 'login.html';
        });

        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }
    </script>
</body>
</html>
